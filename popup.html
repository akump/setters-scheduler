<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Setters Scheduler</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Setters Scheduler</h1>
    </header>

    <div id="status" class="status" hidden></div>

    <div id="app" hidden>
      <div class="field">
        <label for="team-select">My team</label>
        <select id="team-select"></select>
      </div>

      <div class="field">
        <label for="calendar-select">Add to calendar</label>
        <select id="calendar-select">
          <option value="primary"></option>
        </select>
      </div>

      <div class="field inline">
        <label
          ><input type="checkbox" id="select-all" checked /> Select all
          games</label
        >
      </div>

      <ul id="game-list"></ul>

      <button id="add-btn" disabled>Add to Google Calendar</button>
      <div id="result" class="status"></div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
