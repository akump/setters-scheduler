<!doctype html>
<html>
  <body>
    <pre id="out">loading...</pre>
    <script type="module">
      import { parseSchedulePdf } from "./parser.js";
      const out = document.getElementById("out");
      try {
        const res = await fetch(chrome.runtime.getURL("schedule-2375-1.pdf"));
        const buf = await res.arrayBuffer();
        const result = await parseSchedulePdf(buf);
        out.textContent = JSON.stringify(
          { ok: true, roster: result.roster, gameCount: result.games.length, duration: result.durationMinutes },
          null,
          2
        );
      } catch (e) {
        out.textContent = "ERROR: " + (e && e.stack ? e.stack : String(e));
      }
    </script>
  </body>
</html>
